<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Lug'atim | Dilorom Yusupova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-emerald: #064e3b;
            --gold: #d4af37;
            --cream: #f8fafc;
        }
        body { font-family: 'Montserrat', sans-serif; transition: 0.3s; background: #f1f5f9; }
        .arabic-text { font-family: 'Amiri', serif; direction: rtl; }

        /*Sidebar - To'q rangli, kontrastli*/
        .sidebar { background: #064e3b; color: white; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.active { transform: translateX(0); }

        /*Kartochkalar - Aniq chegaralar*/
        .glass-card { 
            background: white; 
            border: 3px solid #064e3b; 
            border-radius: 30px; 
            box-shadow: 10px 10px 0px #064e3b;
        }

        /*Tugmalar - Yuqori kontrast*/
        .btn-main {
            background: #d4af37;
            color: #064e3b;
            font-weight: 900;
            border: 3px solid #064e3b;
            box-shadow: 4px 4px 0px #064e3b;
            transition: 0.2s;
        }
        .btn-main:active { transform: translate(4px, 4px); box-shadow: none; }

        /*Inputlar - Aniq va to'q yozuvli*/
        input {
            background: #f8fafc !important;
            border: 3px solid #064e3b !important;
            color: #064e3b !important;
            border-radius: 15px !important;
            padding: 15px !important;
            font-weight: 700 !important;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #cbd5e1;
            color: #1e293b;
            font-weight: 700;
            padding: 15px;
            border-radius: 15px;
            transition: 0.2s;
        }
        .option-btn:hover { border-color: #064e3b; background: #ecfdf5; }
    </style>
</head>
<body class="p-4">

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-72 z-50 p-8 shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black border-b-4 border-gold pb-2">SOZLAMALAR</h2>
            <button onclick="toggleSidebar()" class="text-4xl">&times;</button>
        </div>

        <div class="space-y-8">
            <div>
                <p class="text-xs font-bold text-emerald-200 mb-3 uppercase tracking-widest">Rejimlar</p>
                <div class="flex flex-col gap-2">
                    <button onclick="setTheme('light')" class="p-3 bg-white text-emerald-900 rounded-xl font-black text-xs">KUN REJIMI</button>
                    <button onclick="setTheme('dark')" class="p-3 bg-slate-900 text-white rounded-xl font-black text-xs border border-emerald-500">TUN REJIMI</button>
                    <button onclick="setTheme('book')" class="p-3 bg-[#f4ecd8] text-amber-900 rounded-xl font-black text-xs">KITOB REJIMI</button>
                </div>
            </div>

            <div>
                <p class="text-xs font-bold text-emerald-200 mb-3 uppercase tracking-widest">Harf o'lchami</p>
                <input type="range" min="20" max="80" value="45" oninput="updateFontSize(this.value)" class="w-full accent-gold">
            </div>

            <div class="pt-10 border-t border-emerald-700">
                <p class="text-[10px] font-bold text-gold uppercase mb-2">Loyiha Muallifi</p>
                <p class="text-lg font-black leading-none">Dilorom Yusupova</p>
                <p class="text-[10px] opacity-70 mt-1">lingvist-tadqiqotchi-dasturchi</p>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center my-6">
            <button onclick="toggleSidebar()" class="w-14 h-14 bg-emerald-900 text-gold rounded-2xl flex items-center justify-center border-4 border-emerald-900 shadow-lg">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1 class="text-xl font-black text-emerald-900 uppercase tracking-tighter text-right leading-none">Mening<br><span class="text-gold text-2xl">Lug'atim</span></h1>
        </header>

        <div class="glass-card p-6 mb-8">
            <div class="space-y-4">
                <input id="word-ar" type="text" placeholder="Arabcha so'z" class="arabic-text text-4xl text-center w-full">
                <input id="word-uz" type="text" placeholder="O'zbekcha tarjimasi" class="text-lg text-center w-full">
                <button onclick="saveWord()" class="btn-main w-full py-4 text-xl">SO'ZNI QO'SHISH</button>
            </div>
        </div>

        <div class="glass-card p-6 border-t-[12px] border-emerald-900">
            <div class="text-center py-10 bg-emerald-50 rounded-2xl mb-6 border-2 border-emerald-200">
                <p id="q-text" class="arabic-text text-emerald-900 leading-none" style="font-size: 45px;">Hali so'z yo'q</p>
            </div>
            <div id="options" class="grid gap-3"></div>
            <p id="feedback" class="mt-6 text-center font-black text-2xl italic h-8"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
