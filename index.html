<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Lug'atim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Zumrad yashil */
            --accent: #f59e0b;  /* Oltin/Sariq */
            --bg: #f8fafc;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            color: #1e293b;
            transition: all 0.4s ease;
        }
        .arabic-font { font-family: 'Amiri', serif; direction: rtl; }
        
        /* Modern Card */
        .m-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Sidebar Modern */
        .m-sidebar {
            background: #ffffff;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }
        .m-sidebar.active { transform: translateX(0); }

        /* Input Styling */
        .m-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            transition: all 0.2s;
        }
        .m-input:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Premium Button */
        .m-btn {
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            transition: all 0.2s;
        }
        .m-btn:active { transform: scale(0.98); }

        /* Modes */
        body.dark-mode { background: #0f172a; color: #f8fafc; }
        body.dark-mode .m-card, body.dark-mode .m-sidebar { background: #1e293b; border-color: #334155; }
        body.dark-mode .m-input { background: #0f172a; border-color: #334155; color: white; }
        
        body.book-mode { background: #fdf6e3; color: #433422; }
        body.book-mode .m-card, body.book-mode .m-sidebar { background: #fefcf5; border-color: #e5d5b7; }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar" class="m-sidebar fixed top-0 left-0 h-full w-80 z-50 p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-800">Sozlamalar</h2>
            <button onclick="toggleSidebar()" class="text-gray-400">&times;</button>
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Rejimni tanlang</p>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="setTheme('light')" class="p-4 rounded-2xl border-2 border-gray-100 flex items-center gap-3 font-semibold"><span class="text-xl">☀️</span> Kun</button>
                    <button onclick="setTheme('dark')" class="p-4 rounded-2xl border-2 border-gray-100 flex items-center gap-3 font-semibold"><span class="text-xl">🌙</span> Tun</button>
                    <button onclick="setTheme('book')" class="p-4 rounded-2xl border-2 border-gray-100 flex items-center gap-3 font-semibold"><span class="text-xl">📖</span> Kitob</button>
                </div>
            </div>

            <div class="pt-10 border-t">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Loyiha muallifi</p>
                <p class="text-lg font-bold mt-1">Dilorom Yusupova</p>
                <p class="text-xs text-emerald-500 font-semibold">lingvist-tadqiqotchi-dasturchi</p>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <button onclick="toggleSidebar()" class="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-gray-100">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="text-right">
                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Arab tili</p>
                <h1 class="text-xl font-800">MENING LUG'ATIM</h1>
            </div>
        </header>

        <div class="m-card p-6 mb-8">
            <div class="space-y-4">
                <input id="word-ar" type="text" placeholder="Arabcha so'z" class="arabic-font m-input text-4xl text-center">
                <input id="word-uz" type="text" placeholder="Tarjimasi" class="m-input text-lg text-center font-semibold">
                <button onclick="saveWord()" class="m-btn w-full">So'zni qo'shish</button>
            </div>
        </div>

        <div class="m-card p-6">
            <div id="game-zone">
                <div class="text-center py-12 bg-gray-50 rounded-3xl mb-8 border border-gray-100">
                    <p id="q-text" class="arabic-font text-emerald-600 leading-tight" style="font-size: 48px;">...</p>
                </div>
                <div id="options" class="grid gap-3"></div>
            </div>
            <p id="feedback" class="mt-6 text-center font-bold text-lg h-6"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
