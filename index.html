<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Lug'atim | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-light: #f0f9ff;
            --blue-royal: #1d4ed8;
            --blue-soft: #60a5fa;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--sky-light); 
            color: #1e3a8a; 
            transition: 0.3s;
        }
        /* Amiri o'rniga zamonaviy arabcha shrift */
        .arabic-font { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            direction: rtl; 
            line-height: 1.6;
        }
        
        .sidebar, .right-panel {
            background: white;
            position: fixed;
            top: 0;
            height: 100%;
            width: 280px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .sidebar { left: 0; transform: translateX(-100%); border-right: 1px solid #e2e8f0; }
        .right-panel { right: 0; transform: translateX(100%); border-left: 1px solid #e2e8f0; }
        .sidebar.active, .right-panel.active { transform: translateX(0); }

        .m-card { background: white; border-radius: 24px; border: 1px solid #e0f2fe; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.05); }
        .m-input { width: 100%; padding: 14px; border-radius: 14px; border: 2px solid #e0f2fe; outline: none; margin-bottom: 12px; font-weight: 600; font-size: 14px; }
        .m-input:focus { border-color: var(--blue-soft); }

        .btn-main { background: var(--blue-royal); color: white; padding: 14px; border-radius: 14px; font-weight: 700; width: 100%; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        .mode-tab { padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: 800; background: #e0f2fe; color: var(--blue-royal); margin-right: 5px; }
        .mode-tab.active { background: var(--blue-royal); color: white; }

        /* Match Styles */
        .match-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
        .match-item { padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 700; font-size: 14px; }
        .match-item.selected { border-color: var(--blue-royal); background: #eff6ff; }
    </style>
</head>
<body class="p-4">

    <div id="sidebar" class="sidebar p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-800 text-blue-900">SOZLAMALAR</h2>
            <button onclick="toggleSidebar()" class="text-2xl text-gray-300">&times;</button>
        </div>
        <div class="space-y-6 text-sm">
            <div class="bg-blue-50 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-blue-400 mb-1 uppercase">Muallif</p>
                <p class="font-800">Dilorom Yusupova</p>
                <p class="text-[10px] text-gray-500">diloromyusupova94@gmail.com</p>
            </div>
            <div>
                <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Arabcha shrift hajmi</p>
                <input type="range" min="20" max="70" value="40" oninput="changeFontSize(this.value)" class="w-full accent-blue-600">
            </div>
            <button onclick="setTheme('dark')" class="w-full text-left p-3 font-bold border rounded-xl">🌙 Tun rejimi</button>
            <button onclick="setTheme('light')" class="w-full text-left p-3 font-bold border rounded-xl bg-blue-50">☀️ Kun rejimi</button>
        </div>
    </div>

    <div id="right-panel" class="right-panel p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-800 text-blue-900 uppercase text-xs">Mavzular</h2>
            <button onclick="toggleRightPanel()" class="text-2xl text-gray-300">&times;</button>
        </div>
        <div id="topic-list" class="space-y-2">
            </div>
        <div class="mt-8 pt-6 border-t">
            <button onclick="setTopic('Haftalik Imtihon')" class="w-full p-4 bg-emerald-600 text-white font-bold rounded-2xl text-xs uppercase shadow-lg shadow-emerald-100">🏆 Haftalik Imtihon</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center py-4 mb-4">
            <button onclick="toggleSidebar()" class="w-12 h-12 bg-white rounded-2xl border border-blue-50 flex items-center justify-center shadow-sm">⚙️</button>
            <div class="text-center">
                <p id="current-topic-label" class="text-[10px] font-800 text-blue-400 uppercase tracking-widest">Mavzu</p>
                <h1 id="active-topic-name" class="text-lg font-800 text-blue-900 leading-tight">Umumiy</h1>
            </div>
            <button onclick="toggleRightPanel()" class="w-12 h-12 bg-white rounded-2xl border border-blue-50 flex items-center justify-center shadow-sm">📚</button>
        </header>

        <div class="m-card p-5 mb-6">
            <input id="topic-input" type="text" placeholder="Mavzu (masalan: Oila)" class="m-input">
            <div class="flex gap-2">
                <input id="ar-word" type="text" placeholder="Arabcha" class="m-input arabic-font text-2xl text-center">
                <input id="uz-word" type="text" placeholder="O'zbekcha" class="m-input text-center">
            </div>
            <button onclick="addWord()" class="btn-main">SAQLASH</button>
        </div>

        <div class="flex gap-1 overflow-x-auto no-scrollbar mb-4">
            <button onclick="setMode('test')" class="mode-tab active" id="m-test">TEST</button>
            <button onclick="setMode('tf')" class="mode-tab" id="m-tf">T/N</button>
            <button onclick="setMode('write')" class="mode-tab" id="m-write">YOZISH</button>
            <button onclick="setMode('match')" class="mode-tab" id="m-match">JUFTLASH</button>
        </div>

        <div class="m-card p-6 min-h-[340px] flex flex-col justify-center">
            <div id="game-zone">
                <p class="text-gray-400 text-sm text-center">Mavzu tanlang yoki so'z qo'shing</p>
            </div>
            <div id="feedback" class="mt-6 text-center font-bold h-6"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
