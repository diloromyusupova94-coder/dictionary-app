<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arab tili - Lug'at</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: 0.3s; }
        .arabic-text { font-family: 'Amiri', serif; direction: rtl; }
        
        /* Rejimlar */
        body.light-mode { background: #f8fafc; color: #1e293b; }
        body.dark-mode { background: #0f172a; color: #f1f5f9; }
        body.dark-mode .card { background: #1e293b; border-color: #334155; }
        body.book-mode { background: #f4ecd8; color: #5b4636; }
        body.book-mode .card { background: #fdfaf1; border-color: #e2d1b3; }

        .card { backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="light-mode min-h-screen pb-10">

    <div class="flex justify-center gap-4 p-4 sticky top-0 z-50 bg-inherit">
        <button onclick="setTheme('light')" class="px-4 py-1 rounded-full border shadow-sm bg-white text-sm text-black">Kun</button>
        <button onclick="setTheme('dark')" class="px-4 py-1 rounded-full border shadow-sm bg-gray-800 text-white text-sm">Tun</button>
        <button onclick="setTheme('book')" class="px-4 py-1 rounded-full border shadow-sm bg-[#e2d1b3] text-amber-900 text-sm">Kitob</button>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="card p-6 rounded-3xl shadow-xl mb-6 bg-white">
            <h1 class="text-2xl font-bold text-center mb-2">Arab tili lug'ati</h1>
            <div class="flex justify-around text-center text-sm font-semibold">
                <div><p class="text-blue-500" id="total-count">0</p><span>So'zlar</span></div>
                <div><p class="text-orange-500" id="exam-timer">--:--</p><span>Imtihongacha</span></div>
                <div><p class="text-red-500" id="error-rate">0</p><span>Xatolar</span></div>
            </div>
            <button onclick="startWeeklyExam()" id="exam-btn" class="w-full mt-4 bg-orange-500 text-white py-3 rounded-2xl font-bold hidden shadow-lg animate-bounce">
                HAFTALIK IMTIHON! ✍️
            </button>
        </div>

        <div class="card p-6 rounded-3xl shadow-md mb-6 bg-white">
            <input id="word-ar" type="text" placeholder="Arabcha so'z (كتاب)" class="arabic-text w-full p-4 border rounded-2xl mb-3 text-2xl focus:ring-2 focus:ring-blue-400 outline-none text-black">
            <input id="word-uz" type="text" placeholder="O'zbekcha tarjimasi" class="w-full p-3 border rounded-xl mb-3 outline-none text-black">
            <button onclick="saveWord()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 transition">Ro'yxatga qo'shish</button>
        </div>

        <div id="game-container" class="card p-6 rounded-3xl shadow-lg bg-white">
            <div id="question-card" class="text-center mb-6 py-10 bg-slate-50 rounded-2xl border-2 border-dashed">
                <p id="q-text" class="arabic-text text-4xl mb-2">So'z kiriting</p>
                <p id="q-type" class="text-xs uppercase tracking-widest text-gray-400">Mashq</p>
            </div>
            <div id="options" class="grid grid-cols-1 gap-3"></div>
            <p id="feedback" class="mt-4 text-center h-6 font-bold"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
