<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Lug'atim | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; transition: 0.3s; }
        .arabic-font { font-family: 'Amiri', serif; direction: rtl; }
        
        /* Sidebar butunlay oq-to'q rangda, chala emas! */
        .sidebar { background: #ffffff; transform: translateX(-100%); transition: 0.4s ease; border-right: 1px solid #e2e8f0; z-index: 100; }
        .sidebar.active { transform: translateX(0); }
        
        /* Input ichidagi matnlar ko'rinishi uchun */
        .m-input { 
            background: #ffffff !important; 
            border: 2px solid #cbd5e1 !important; 
            color: #0f172a !important; 
            border-radius: 12px;
            padding: 14px;
            width: 100%;
        }
        .m-input::placeholder { color: #94a3b8 !important; font-weight: 400; }

        /* Tugma - To'q sariq, yozuvi oq va aniq */
        .m-btn {
            background: #f97316;
            color: #ffffff !important;
            font-weight: 800;
            padding: 16px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4);
        }

        /* Cardlar */
        .m-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="light-mode">

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-80 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-800">SOZLAMALAR</h2>
            <button onclick="toggleSidebar()" class="text-2xl text-gray-400">&times;</button>
        </div>

        <div class="space-y-8">
            <div>
                <p class="text-[10px] font-800 text-gray-400 uppercase mb-4">Interfeys</p>
                <div class="space-y-2">
                    <button onclick="setTheme('light')" class="w-full p-3 bg-gray-50 rounded-lg font-bold text-sm text-left">☀️ Kun rejimi</button>
                    <button onclick="setTheme('dark')" class="w-full p-3 bg-slate-900 text-white rounded-lg font-bold text-sm text-left">🌙 Tun rejimi</button>
                    <button onclick="setTheme('book')" class="w-full p-3 bg-[#fdf6e3] text-amber-900 rounded-lg font-bold text-sm text-left">📖 Kitob rejimi</button>
                </div>
            </div>

            <div>
                <p class="text-[10px] font-800 text-gray-400 uppercase mb-2">Arabcha shrift: <span id="ar-val">45</span>px</p>
                <input type="range" min="20" max="80" value="45" oninput="updateFontSize(this.value)" class="w-full accent-orange-500">
            </div>

            <div>
                <p class="text-[10px] font-800 text-gray-400 uppercase mb-2">Loyiha Metodikasi</p>
                <div class="text-xs text-gray-600 bg-gray-50 p-4 rounded-xl leading-relaxed">
                    <ul class="list-disc pl-4 space-y-2">
                        <li><b>Shaxsiy lug'at:</b> Faqat o'zingiz kiritgan so'zlar.</li>
                        <li><b>Aqliy takrorlash:</b> Xatolaringiz ustida ishlash.</li>
                    </ul>
                </div>
            </div>

            <div class="pt-6 border-t">
                <p class="text-sm font-800">Dilorom Yusupova</p>
                <p class="text-[10px] text-emerald-600 font-bold uppercase">Lingvist-Tadqiqotchi</p>
                <a href="mailto:diloromyusupova94@gmail.com" class="text-[10px] text-blue-500 underline mt-2 block">diloromyusupova94@gmail.com</a>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <button onclick="toggleSidebar()" class="w-12 h-12 bg-white shadow-sm border rounded-xl flex items-center justify-center">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="text-right">
                <h1 class="text-lg font-800 text-slate-800">MENING LUG'ATIM</h1>
                <p class="text-[10px] font-bold text-orange-500 uppercase">Lug'at darsligi</p>
            </div>
        </header>

        <div class="m-card p-6 mb-6">
            <div class="space-y-4">
                <input id="word-ar" type="text" placeholder="Arabcha so'z" class="arabic-font m-input text-3xl text-center">
                <input id="word-uz" type="text" placeholder="O'zbekcha tarjimasi" class="m-input text-lg text-center font-bold">
                <button onclick="saveWord()" class="m-btn w-full">SAQLASH VA QO'SHISH</button>
            </div>
        </div>

        <div class="m-card p-6 border-t-4 border-orange-500">
            <div class="text-center py-10 bg-slate-50 rounded-2xl mb-6">
                <p id="q-text" class="arabic-font text-slate-800 leading-tight" style="font-size: 45px;">...Lug'at bo'sh</p>
            </div>
            <div id="options" class="grid gap-3"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
