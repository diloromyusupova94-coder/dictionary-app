<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Lug'atim | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #1e3a8a; --card: #ffffff; }
        .dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .arabic-font { font-family: 'IBM Plex Sans Arabic', sans-serif; direction: rtl; }
        .sidebar, .right-panel { background: var(--card); position: fixed; top: 0; height: 100%; width: 300px; transition: 0.4s ease; z-index: 1000; overflow-y: auto; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .sidebar { left: 0; transform: translateX(-100%); }
        .right-panel { right: 0; transform: translateX(100%); }
        .sidebar.active, .right-panel.active { transform: translateX(0); }
        .m-card { background: var(--card); border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(59, 130, 246, 0.1); }
        .m-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid rgba(59, 130, 246, 0.1); background: var(--card); color: var(--text); outline: none; }
        .mode-tab { padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; background: rgba(59, 130, 246, 0.1); color: #2563eb; white-space: nowrap; }
        .mode-tab.active { background: #2563eb; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="sidebar" class="sidebar p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-blue-600">QO'LLANMA</h2>
            <button onclick="toggleSidebar()" class="text-2xl">&times;</button>
        </div>
        <div class="text-xs space-y-4">
            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                <p class="font-bold mb-2">METODIKA:</p>
                <ul class="list-disc pl-4 space-y-1">
                    <li>So'zlarni mavzu bo'yicha kiriting.</li>
                    <li>Internetisiz ham ishlaydi.</li>
                    <li>Xatolarni tizim o'zi takrorlatadi.</li>
                </ul>
            </div>
            <div class="pt-4 border-t">
                <p class="font-bold">Muallif:</p>
                <p>Yusupova Dilorom</p>
                <p class="text-blue-500">diloromyusupova94@gmail.com</p>
            </div>
        </div>
    </div>

    <div id="right-panel" class="right-panel p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-blue-600 uppercase">Mavzular</h2>
            <button onclick="toggleRightPanel()" class="text-2xl">&times;</button>
        </div>
        <div id="topic-list" class="space-y-2"></div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center py-4 mb-4">
            <button onclick="toggleSidebar()" class="w-10 h-10 m-card flex items-center justify-center">ℹ️</button>
            <h1 id="active-topic-name" class="text-lg font-800 text-blue-600 uppercase tracking-tighter">Umumiy</h1>
            <div class="flex gap-2">
                <button onclick="toggleDarkMode()" class="w-10 h-10 m-card flex items-center justify-center">🌙</button>
                <button onclick="toggleRightPanel()" class="w-10 h-10 m-card flex items-center justify-center">📚</button>
            </div>
        </header>

        <div class="m-card p-5 mb-6">
            <input id="topic-input" type="text" placeholder="Mavzu nomi" class="m-input mb-2 text-xs">
            <div class="flex gap-2 mb-3">
                <input id="ar-word" type="text" placeholder="Arabcha" class="m-input arabic-font text-2xl text-center">
                <input id="uz-word" type="text" placeholder="O'zbekcha" class="m-input text-center text-sm font-bold">
            </div>
            <button onclick="addWord()" class="w-full p-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-blue-200">SAQLASH</button>
        </div>

        <div id="mode-tabs" class="flex gap-1 overflow-x-auto no-scrollbar mb-4 hidden">
            <button onclick="setMode('test')" class="mode-tab active" id="m-test">TEST</button>
            <button onclick="setMode('tf')" class="mode-tab" id="m-tf">T/N</button>
            <button onclick="setMode('write')" class="mode-tab" id="m-write">YOZISH</button>
            <button onclick="setMode('match')" class="mode-tab" id="m-match">JUFTLASH</button>
            <button onclick="setMode('anagram')" class="mode-tab" id="m-anagram">ANAGRAM</button>
        </div>

        <div class="m-card p-6 min-h-[350px] flex flex-col justify-center relative">
            <div id="game-zone" class="text-center text-gray-400 text-sm italic">Hali so'z yo'q...</div>
            <div id="feedback" class="mt-6 text-center font-bold text-lg h-6"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
